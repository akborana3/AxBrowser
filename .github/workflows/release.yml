name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.6'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Generate Gradle Wrapper (if missing)
      run: |
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "Generating Gradle wrapper..."
          gradle wrapper --gradle-version 8.6 --no-daemon
        fi

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Build Release AAB
      run: ./gradlew bundleRelease --no-daemon --stacktrace

    - name: Sign APK with debug key
      run: |
        # Find build-tools
        BUILD_TOOLS=$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)
        
        # Create debug keystore
        keytool -genkey -v -keystore /tmp/debug.keystore \
          -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US"
        
        # Find the unsigned APK
        UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
        
        if [ -n "$UNSIGNED_APK" ]; then
          # Zipalign
          ${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/zipalign -v -p 4 "$UNSIGNED_APK" /tmp/aligned.apk
          
          # Sign with debug key
          ${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/apksigner sign \
            --ks /tmp/debug.keystore --ks-pass pass:android \
            --key-pass pass:android \
            --out AxBrowser-v${{ steps.version.outputs.VERSION }}.apk \
            /tmp/aligned.apk
          
          echo "APK signed successfully"
        else
          echo "ERROR: No APK found to sign"
          exit 1
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: AxBrowser v${{ steps.version.outputs.VERSION }}
        generate_release_notes: true
        files: |
          AxBrowser-v${{ steps.version.outputs.VERSION }}.apk
          app/build/outputs/bundle/release/*.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
